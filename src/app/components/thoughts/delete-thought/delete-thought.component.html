<section class="container delete-thoughts ff-inter">
  <div class="modal">
    <p>The thought will be deleted. <br> Are you sure?</p>
    <div class="actions">
      <button class="button delete-button" (click)="deleteThought()">Delete</button>
      <button class="button cancel-button" (click)="cancel()">Cancel</button>
    </div>
  </div>
  <div class="overlay"></div>
</section>
